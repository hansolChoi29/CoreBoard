spring:

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        show_sql: false
        format_sql: false

jwt:
  secret:
    key: test-jwt-secret-key-for-coreboard

aes:
  secret:
    key: 1234567890ABCDEF
security:
  bcrypt:
    strength: 4

logging:
  level:
    org.springframework.test.web.servlet: WARN
    org.springframework.mock.web: WARN
cloud:
  aws:
    endpoint: http://localhost:9000
    credentials:
      access-key: minioadmin
      secret-key: minioadmin
    s3:
      bucket: coreboard-attachments
    region:
      static: us-east-1
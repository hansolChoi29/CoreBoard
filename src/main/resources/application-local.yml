server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/CoreBoard?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Seoul
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true

jwt:
  secret:
    key: ad28a1bb3bad96055ba5345cbe3c6b99
aes:
  secret:
    key: MySuperSecretKey

management:
  endpoints:
    web:
      exposure:
        include: health, metrics, prometheus
  endpoint:
    health:
      show-details: always
cloud:
  aws:
    endpoint: http://localhost:9000
    public-url: http://localhost:9000/coreboard-attachments
    credentials:
      access-key: minioadmin
      secret-key: minioadmin
    s3:
      bucket: coreboard-attachments
    region:
      static: us-east-1
  # 사람이 브라우저로 보는 관리자 화면 → http://localhost:9001
  # Spring Boot 서버가 S3Client로 접근하는 API → http://localhost:9000
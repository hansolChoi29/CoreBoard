name: Deploy CoreBoard to GCP

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Test & Build
        run: |
          chmod +x ./gradlew
          ./gradlew clean build

      - name: Upload jar to GCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          source: "build/libs/coreboard.jar"
          target: "/home/${{ secrets.GCP_USER }}/apps/coreboard"

      - name: Switch to app.jar & restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            set -e
            cd /home/${{ secrets.GCP_USER }}/apps/coreboard
            mv -f build/libs/coreboard.jar app.jar
            sudo systemctl restart coreboard
            sudo systemctl status coreboard --no-pager
name: Deploy CoreBoard to GCP

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Test & Build
        env:
          SPRING_PROFILES_ACTIVE: test
        run: |
          chmod +x ./gradlew
          ./gradlew clean build

      - name: Prepare deploy jar
        run: |
          cp build/libs/*SNAPSHOT.jar build/libs/coreboard.jar

      - name: Upload jar to GCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          source: "build/libs/coreboard.jar"
          target: "/home/${{ secrets.GCP_USER }}/apps/coreboard"

      - name: Switch to app.jar & restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            set -e
            cd /home/${{ secrets.GCP_USER }}/apps/coreboard

            mv -f build/libs/coreboard.jar app.jar
            sudo systemctl restart coreboard

            for i in {1..60}; do
              if curl -fsS http://localhost:8080/actuator/health > /dev/null; then
                echo "CoreBoard is healthy"
                exit 0
              fi
              echo "Waiting for CoreBoard... ($i/60)"
              sleep 10
            done

            sudo journalctl -u coreboard -n 100 --no-pager
            exit 1
